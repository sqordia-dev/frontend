<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Maintenance | Sqordia</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      --momentum-orange: #FF6B00;
      --strategy-blue: #1A2B47;
      --bg-light: #f8fafc;
      --bg-dark: #0f1419;
      --card-light: #ffffff;
      --card-dark: #1e293b;
      --text-light: #1e293b;
      --text-dark: #f1f5f9;
      --text-muted-light: #64748b;
      --text-muted-dark: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-light);
      color: var(--text-light);
      transition: background-color 0.3s, color 0.3s;
    }

    body.dark {
      background-color: var(--bg-dark);
      color: var(--text-dark);
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 600px;
      margin: 0 auto;
      padding: 24px;
      width: 100%;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 0;
    }

    .logo {
      width: 40px;
      height: 40px;
      background-color: var(--strategy-blue);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px -2px rgba(26, 43, 71, 0.4);
    }

    .logo svg {
      width: 20px;
      height: 20px;
      color: white;
    }

    .brand {
      font-size: 20px;
      font-weight: 700;
      color: var(--strategy-blue);
      letter-spacing: -0.025em;
    }

    body.dark .brand {
      color: var(--text-dark);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 0;
    }

    .content {
      text-align: center;
    }

    .icon-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }

    .icon-glow {
      position: absolute;
      width: 128px;
      height: 128px;
      background: radial-gradient(circle, rgba(255, 107, 0, 0.2) 0%, transparent 70%);
      border-radius: 50%;
    }

    .gear-icon {
      width: 64px;
      height: 64px;
      color: var(--momentum-orange);
      animation: rotate 8s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.025em;
      color: var(--strategy-blue);
    }

    body.dark h1 {
      color: var(--text-dark);
    }

    .subtitle {
      font-size: 16px;
      color: var(--text-muted-light);
      margin-bottom: 40px;
      line-height: 1.6;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    body.dark .subtitle {
      color: var(--text-muted-dark);
    }

    .card {
      background-color: var(--card-light);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.08);
      margin-bottom: 24px;
    }

    body.dark .card {
      background-color: var(--card-dark);
      box-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.3);
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .progress-text {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted-light);
    }

    body.dark .progress-text {
      color: var(--text-muted-dark);
    }

    .progress-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--momentum-orange);
      font-variant-numeric: tabular-nums;
    }

    .progress-bar {
      height: 12px;
      background-color: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    body.dark .progress-bar {
      background-color: #334155;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--momentum-orange) 0%, #ff8c40 100%);
      border-radius: 999px;
      transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 0 20px rgba(255, 107, 0, 0.4);
      position: relative;
      overflow: hidden;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 1.5s infinite linear;
    }

    @keyframes shimmer {
      to { left: 200%; }
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background-color: var(--bg-light);
      border-radius: 12px;
      margin-bottom: 24px;
    }

    body.dark .status-row {
      background-color: #0f172a;
    }

    .status-icon {
      width: 40px;
      height: 40px;
      background-color: #e2e8f0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    body.dark .status-icon {
      background-color: #334155;
    }

    .status-icon svg {
      width: 20px;
      height: 20px;
      color: var(--momentum-orange);
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .status-content {
      flex: 1;
      text-align: left;
      min-width: 0;
    }

    .status-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted-light);
      margin-bottom: 2px;
    }

    body.dark .status-label {
      color: var(--text-muted-dark);
    }

    .status-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-light);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    body.dark .status-value {
      color: var(--text-dark);
    }

    .refresh-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .auto-refresh {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted-light);
    }

    body.dark .auto-refresh {
      color: var(--text-muted-dark);
    }

    .pulse-dot {
      position: relative;
      width: 10px;
      height: 10px;
    }

    .pulse-dot::before,
    .pulse-dot::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background-color: #10b981;
    }

    .pulse-dot::before {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(2); opacity: 0; }
    }

    .divider {
      color: #cbd5e1;
      font-size: 12px;
    }

    body.dark .divider {
      color: #475569;
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--momentum-orange);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      padding: 0;
      transition: opacity 0.2s;
    }

    .refresh-btn:hover {
      opacity: 0.8;
    }

    .refresh-btn svg {
      width: 14px;
      height: 14px;
    }

    .thank-you {
      font-size: 14px;
      color: var(--text-muted-light);
    }

    body.dark .thank-you {
      color: var(--text-muted-dark);
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #cbd5e1;
    }

    body.dark footer {
      color: #475569;
    }

    /* Language toggle */
    .lang-toggle {
      position: absolute;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 8px;
    }

    .lang-btn {
      padding: 6px 12px;
      border: 1px solid #e2e8f0;
      background: transparent;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-muted-light);
    }

    body.dark .lang-btn {
      border-color: #334155;
      color: var(--text-muted-dark);
    }

    .lang-btn.active {
      background-color: var(--momentum-orange);
      border-color: var(--momentum-orange);
      color: white;
    }

    @media (max-width: 480px) {
      h1 { font-size: 24px; }
      .subtitle { font-size: 14px; }
      .card { padding: 24px; }
    }
  </style>
</head>
<body>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('fr')">FR</button>
  </div>

  <div class="container">
    <header>
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/>
          <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/>
          <path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/>
          <path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/>
          <path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/>
          <path d="M3.477 10.896a4 4 0 0 1 .585-.396"/>
          <path d="M19.938 10.5a4 4 0 0 1 .585.396"/>
          <path d="M6 18a4 4 0 0 1-1.967-.516"/>
          <path d="M19.967 17.484A4 4 0 0 1 18 18"/>
        </svg>
      </div>
      <span class="brand">Sqordia</span>
    </header>

    <main>
      <div class="content">
        <div class="icon-wrapper">
          <div class="icon-glow"></div>
          <svg class="gear-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/>
            <path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>
            <path d="M12 2v2"/>
            <path d="M12 22v-2"/>
            <path d="m17 20.66-1-1.73"/>
            <path d="M11 10.27 7 3.34"/>
            <path d="m20.66 17-1.73-1"/>
            <path d="m3.34 7 1.73 1"/>
            <path d="M14 12h8"/>
            <path d="M2 12h2"/>
            <path d="m20.66 7-1.73 1"/>
            <path d="m3.34 17 1.73-1"/>
            <path d="m17 3.34-1 1.73"/>
            <path d="m11 13.73-4 6.93"/>
          </svg>
        </div>

        <h1 id="heading">We're upgrading Sqordia</h1>
        <p class="subtitle" id="subtitle">Our team is deploying improvements to make your experience even better.</p>

        <div class="card">
          <div class="progress-label">
            <span class="progress-text" id="progressLabel">Deployment Progress</span>
            <span class="progress-value" id="progressValue">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
          </div>

          <div class="status-row">
            <div class="status-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
              </svg>
            </div>
            <div class="status-content">
              <p class="status-label" id="stepLabel">Current step</p>
              <p class="status-value" id="stepValue">Initializing...</p>
            </div>
          </div>

          <div class="refresh-row">
            <div class="auto-refresh">
              <span class="pulse-dot"></span>
              <span id="autoRefreshText">Auto-refreshing</span>
            </div>
            <span class="divider">|</span>
            <button class="refresh-btn" onclick="checkStatus()">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                <path d="M21 3v5h-5"/>
                <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
                <path d="M8 16H3v5"/>
              </svg>
              <span id="checkStatusText">Check Status</span>
            </button>
          </div>
        </div>

        <p class="thank-you" id="thankYou">Thank you for your patience.</p>
      </div>
    </main>

    <footer>
      &copy; <span id="year"></span> Sqordia. All rights reserved.
    </footer>
  </div>

  <script>
    // Translations
    const translations = {
      en: {
        heading: "We're upgrading Sqordia",
        subtitle: "Our team is deploying improvements to make your experience even better.",
        progressLabel: "Deployment Progress",
        stepLabel: "Current step",
        autoRefreshText: "Auto-refreshing",
        checkStatusText: "Check Status",
        thankYou: "Thank you for your patience.",
        initializing: "Initializing..."
      },
      fr: {
        heading: "Nous ameliorons Sqordia",
        subtitle: "Notre equipe deploie des ameliorations pour optimiser votre experience.",
        progressLabel: "Progression du deploiement",
        stepLabel: "Etape actuelle",
        autoRefreshText: "Actualisation auto",
        checkStatusText: "Verifier le statut",
        thankYou: "Merci de votre patience.",
        initializing: "Initialisation..."
      }
    };

    let currentLang = 'en';

    // Set year
    document.getElementById('year').textContent = new Date().getFullYear();

    // Dark mode detection
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.body.classList.add('dark');
    }

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      document.body.classList.toggle('dark', e.matches);
    });

    // Language toggle
    function setLang(lang) {
      currentLang = lang;
      const t = translations[lang];

      document.getElementById('heading').textContent = t.heading;
      document.getElementById('subtitle').textContent = t.subtitle;
      document.getElementById('progressLabel').textContent = t.progressLabel;
      document.getElementById('stepLabel').textContent = t.stepLabel;
      document.getElementById('autoRefreshText').textContent = t.autoRefreshText;
      document.getElementById('checkStatusText').textContent = t.checkStatusText;
      document.getElementById('thankYou').textContent = t.thankYou;

      // Update step value if it's the default
      const stepValue = document.getElementById('stepValue');
      if (stepValue.textContent === translations.en.initializing || stepValue.textContent === translations.fr.initializing) {
        stepValue.textContent = t.initializing;
      }

      // Update button states
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase() === lang);
      });
    }

    // Check status from API
    async function checkStatus() {
      try {
        const response = await fetch('/api/v1/maintenance/status');
        if (response.ok) {
          const data = await response.json();

          if (!data.isEnabled) {
            // Maintenance is over, reload the page
            window.location.reload();
            return;
          }

          // Update progress
          const progress = data.progressPercent || 0;
          document.getElementById('progressValue').textContent = progress + '%';
          document.getElementById('progressFill').style.width = progress + '%';

          // Update step
          if (data.currentStep) {
            document.getElementById('stepValue').textContent = data.currentStep;
          }
        }
      } catch (error) {
        console.warn('Failed to fetch status:', error);
      }
    }

    // Initial check and polling
    checkStatus();
    setInterval(checkStatus, 15000);
  </script>
</body>
</html>
