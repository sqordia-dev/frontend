name: Frontend E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
  workflow_dispatch:
    inputs:
      test_tag:
        description: 'Test tag to run (e.g., @auth, @dashboard, @smoke, @business-plan)'
        required: false
        default: ''
      environment:
        description: 'Environment to test against'
        required: false
        default: 'local'
        type: choice
        options:
          - local
          - staging
      browser:
        description: 'Browser to test with'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all

env:
  CI: true
  NODE_VERSION: '20'
  APP_VERSION: ${{ github.sha }}
  WORKING_DIR: frontend

jobs:
  # Install dependencies and cache
  install:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

  # Lint and type check
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

  # Smoke tests (quick validation)
  smoke-tests:
    needs: [install, lint]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Restore Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers (fallback)
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Start preview server
        run: npm run preview &
        env:
          VITE_API_URL: http://localhost:5241

      - name: Wait for server
        run: |
          echo "Waiting for server to start..."
          npx wait-on http://localhost:4173 --timeout 60000

      - name: Run smoke tests
        run: npx playwright test --grep @smoke --project=chromium
        env:
          TEST_ENV: ${{ github.event.inputs.environment || 'local' }}
          SKIP_AUTH_SETUP: 'true'

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  # Full E2E test suite
  e2e-tests:
    needs: smoke-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Restore Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers (fallback)
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Build frontend
        run: npm run build

      - name: Start preview server
        run: npm run preview &
        env:
          VITE_API_URL: http://localhost:5241

      - name: Wait for server
        run: |
          echo "Waiting for server to start..."
          npx wait-on http://localhost:4173 --timeout 60000

      - name: Run E2E tests
        run: |
          if [ -n "${{ github.event.inputs.test_tag }}" ]; then
            npx playwright test --grep "${{ github.event.inputs.test_tag }}" --project=${{ matrix.browser }} --shard=${{ matrix.shard }}/3
          else
            npx playwright test --project=${{ matrix.browser }} --shard=${{ matrix.shard }}/3
          fi
        env:
          TEST_ENV: ${{ github.event.inputs.environment || 'local' }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          SKIP_AUTH_SETUP: 'true'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ matrix.browser }}-${{ matrix.shard }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  # Visual regression tests
  visual-regression:
    needs: smoke-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Restore Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers (fallback)
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Start preview server
        run: npm run preview &
        env:
          VITE_API_URL: http://localhost:5241

      - name: Wait for server
        run: |
          echo "Waiting for server to start..."
          npx wait-on http://localhost:4173 --timeout 60000

      - name: Run visual regression tests
        run: npx playwright test --project=visual-regression
        env:
          TEST_ENV: local
          SKIP_AUTH_SETUP: 'true'

      - name: Upload visual regression results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-results
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 14

  # Merge test reports
  merge-reports:
    needs: [e2e-tests, visual-regression]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results

      - name: List downloaded artifacts
        run: ls -la all-results/

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: merged-e2e-report
          path: all-results/
          retention-days: 30

  # Summary job
  summary:
    needs: [lint, smoke-tests, e2e-tests, visual-regression]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          echo "## Frontend E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Visual Regression | ${{ needs.visual-regression.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if critical tests failed
        if: needs.lint.result == 'failure' || needs.smoke-tests.result == 'failure' || needs.e2e-tests.result == 'failure'
        run: exit 1
